<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>YMBH Display</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <!-- ===== HEADER ===== -->
        <div class="header">
            <img src="logo-amman.png" class="logo">
            <img src="logo v2.png" class="logo-ymbh">
            <div class="mosque-name">YAYASAN MUSLIM BATU HIJAU</div>
            <div id="clock" class="clock">00:00:00</div>
            <div id="date" class="date">Memuat tanggal...</div>
        </div>

        <div id="next-prayer-box" class="next-prayer-box">
            <div id="next-prayer-name"></div>
            <div id="next-prayer-countdown"></div>
        </div>

        <!-- ===== MAIN PANEL ===== -->
        <div class="middle">
            <div class="card">
    
                <!-- ===== SLIDE JADWAL ===== -->
                <div class="slide" id="slide-jadwal">
                    <div class="section-title">JADWAL SHOLAT</div>
            
                    <table class="prayer-table">
                        <tr id="row-subuh"><td>SUBUH<div class="ar">الفجر</div></td><td id="subuh">--:--</td></tr>
                        <tr id="row-dzuhur"><td>DZUHUR<div class="ar">الظهر</div></td><td id="dzuhur">--:--</td></tr>
                        <tr id="row-ashar"><td>ASHAR<div class="ar">العصر</div></td><td id="ashar">--:--</td></tr>
                        <tr id="row-maghrib"><td>MAGHRIB<div class="ar">المغرب</div></td><td id="maghrib">--:--</td></tr>
                        <tr id="row-isya"><td>ISYA<div class="ar">العشاء</div></td><td id="isya">--:--</td></tr>
                    </table>
                </div>
            
                <!-- ===== SLIDE TARAWIH ===== -->
                <div class="slide hidden" id="slide-tarawih">
                    <div class="ornament">┈┉━ ❁ ﷽ ❁ ━┉┈</div>
                
                    <div class="section-title">INFO IMAM TARAWIH</div>
                
                    <div class="slide-subtitle">
                        <div id="tarawih-hijri"></div>
                        <div id="tarawih-date"></div>
                    </div>
                
                    <div class="divider"></div>
                
                    <div class="slide-content" id="tarawih-content"></div>
                
                    <div class="slide-arabic">
                        جزاكم الله خيرا وبارك الله فيكم
                    </div>
                
                    <div class="ornament bottom">┈┉━━¤📖¤━━┉┈</div>
                </div>
                
                
                <!-- ===== SLIDE KHOTIB ===== -->
                <div class="slide hidden" id="slide-khotib">
                    <div class="section-title">INFO KHOTIB JUMAT</div>
                
                    <div class="slide-subtitle">
                        <div id="khotib-hijri"></div>
                        <div id="khotib-date"></div>
                    </div>
                
                    <div class="divider"></div>
                
                    <div class="slide-content khotib-content" id="khotib-content"></div>
                </div>

                <!-- ===== SLIDE HADITS BERGAMBAR (BARU) ===== -->
                <div class="slide hidden" id="slide-hadits-images">
                  <div class="hadits-img-wrapper">
                    <img id="hadits-image" src="" alt="Hadits" />
                  </div>
                </div>
            
            </div>
        </div>

        <!-- ===== FOOTER INFO ===== -->
        <div class="footer">

            <!--<div id="kajian-box" class="kajian-box">
                Memuat info kajian...
            </div>-->
        
            <div id="hadits-box" class="hadits-box">
                Memuat hadits...
            </div>
        
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
